name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Flutter installieren
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter-Web-Dateien erzeugen
        run: flutter create . --platforms=web --project-name=finance_english_pro

      - name: Abhängigkeiten installieren
        run: flutter pub get

      - name: Web-App erstellen
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: App hochladen
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: App veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
